<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" fill="none">
  <defs>
    <clipPath id="lh-d"><rect x="0" y="0" width="50" height="110"/></clipPath>
    <clipPath id="rh-d"><rect x="50" y="0" width="50" height="110"/></clipPath>
    <filter id="gg-d"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bg-d"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="gG-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/><stop offset="50%" stop-color="#F0C040"/><stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="bG-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4A8A"/><stop offset="50%" stop-color="#4AABFF"/><stop offset="100%" stop-color="#1A6ABF"/>
    </linearGradient>
    <linearGradient id="fG-d" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFB020"/><stop offset="50%" stop-color="#FF7800"/><stop offset="100%" stop-color="#FFE040"/>
    </linearGradient>
  </defs>

  <!-- Glow backdrop -->
  <ellipse cx="50" cy="60" rx="36" ry="40" fill="#4AABFF" opacity="0.05"/>

  <!-- Shield left (bright gold) -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#lh-d)" fill="url(#gG-d)" stroke="#FFD700" stroke-width="2" filter="url(#gg-d)"/>
  <!-- Shield right (electric blue) -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#rh-d)" fill="url(#bG-d)" stroke="#4AABFF" stroke-width="2" filter="url(#bg-d)"/>

  <!-- Molecular left (gold) -->
  <line x1="22" y1="38" x2="34" y2="54" stroke="#F0C040" stroke-width="1.6"/>
  <line x1="34" y1="54" x2="22" y2="66" stroke="#F0C040" stroke-width="1.6"/>
  <line x1="22" y1="38" x2="22" y2="66" stroke="#F0C040" stroke-width="1.6"/>
  <line x1="22" y1="38" x2="34" y2="30" stroke="#F0C040" stroke-width="1.2"/>
  <circle cx="22" cy="38" r="3.2" fill="#F0C040" filter="url(#gg-d)"/>
  <circle cx="34" cy="54" r="2.8" fill="#F0C040"/>
  <circle cx="22" cy="66" r="2.8" fill="#F0C040"/>
  <circle cx="34" cy="30" r="2.2" fill="#F0C040"/>

  <!-- Molecular right (blue) -->
  <line x1="78" y1="38" x2="66" y2="54" stroke="#4AABFF" stroke-width="1.6"/>
  <line x1="66" y1="54" x2="78" y2="66" stroke="#4AABFF" stroke-width="1.6"/>
  <line x1="78" y1="38" x2="78" y2="66" stroke="#4AABFF" stroke-width="1.6"/>
  <line x1="78" y1="38" x2="66" y2="30" stroke="#4AABFF" stroke-width="1.2"/>
  <circle cx="78" cy="38" r="3.2" fill="#4AABFF" filter="url(#bg-d)"/>
  <circle cx="66" cy="54" r="2.8" fill="#4AABFF"/>
  <circle cx="78" cy="66" r="2.8" fill="#4AABFF"/>
  <circle cx="66" cy="30" r="2.2" fill="#4AABFF"/>

  <!-- S letter -->
  <text x="50" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="900" fill="#F0C040" filter="url(#gg-d)" style="font-style:italic;">S</text>

  <!-- Torch -->
  <rect x="46.5" y="47" width="7" height="23" rx="2.5" fill="#F0C040"/>
  <rect x="45.5" y="51" width="9" height="1.8" rx="0.9" fill="#C9A227"/>
  <rect x="45.5" y="55" width="9" height="1.8" rx="0.9" fill="#C9A227"/>
  <rect x="45.5" y="59" width="9" height="1.8" rx="0.9" fill="#C9A227"/>
  <!-- Flame -->
  <path d="M50 47 C47 43 44 40 46 35 C48 37 50 34 50 31 C50 34 52 37 54 35 C56 40 53 43 50 47Z" fill="url(#fG-d)" filter="url(#gg-d)"/>
  <path d="M50 46 C48.5 43 47 41 48 37.5 C49 39 50 37.5 50 36 C50 37.5 51 39 52 37.5 C53 41 51.5 43 50 46Z" fill="#FFFBAA" opacity="0.9"/>
  <!-- Keyhole -->
  <circle cx="50" cy="73" r="4" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.7"/>
  <path d="M48.5 73 L48.5 79 L51.5 79 L51.5 73" fill="#fff" opacity="0.7"/>

  <!-- Bottom glow -->
  <ellipse cx="50" cy="106" rx="18" ry="5" fill="#4AABFF" opacity="0.18"/>

  <!-- SHAMEL wordmark — white for dark bg -->
  <text x="106" y="52" font-family="Manrope, 'Segoe UI', system-ui, sans-serif"
        font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="1.5">SHAMEL</text>
  <!-- Tagline -->
  <text x="108" y="68" font-family="Inter, 'Segoe UI', sans-serif" font-size="10" fill="#8BA8CC" letter-spacing="0.3">Secure High-dimensional Academic Management &amp; Entry Logic</text>
</svg>
