<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدخال مشكلة — SHAMEL Testing</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--inp:#334155;--txt:#e2e8f0;--mut:#94a3b8;--acc:#38bdf8;--ok:#22c55e;}
  *{box-sizing:border-box;font-family:"Segoe UI",Tahoma,sans-serif;}
  body{background:var(--bg);color:var(--txt);margin:0;padding:24px;}
  .wrap{max-width:720px;margin:0 auto;}
  h1{font-size:22px;margin:0 0 4px;}
  p.sub{color:var(--mut);margin:0 0 20px;font-size:14px;}
  .card{background:var(--card);border-radius:14px;padding:20px;}
  label{display:block;font-size:13px;color:var(--mut);margin:14px 0 6px;}
  input,textarea,select{width:100%;background:var(--inp);border:1px solid #475569;color:var(--txt);
    border-radius:8px;padding:10px;font-size:14px;}
  textarea{min-height:70px;resize:vertical;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row>div{flex:1;min-width:140px;}
  .btns{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}
  button{flex:1;min-width:160px;border:0;border-radius:10px;padding:13px;font-size:15px;
    font-weight:600;cursor:pointer;}
  .b1{background:var(--acc);color:#06283d;}
  .b2{background:var(--inp);color:var(--txt);}
  .ok{color:var(--ok);text-align:center;margin-top:12px;height:18px;font-size:14px;}
  pre{background:#0b1220;border-radius:10px;padding:14px;overflow:auto;font-size:12px;
    color:#cbd5e1;max-height:240px;margin-top:16px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🐞 تسجيل مشكلة جديدة</h1>
  <p class="sub">املأ الحقول، اضغط «تنزيل الملف» واحفظه داخل فولدر <b>Issues</b> في الـVault. اللوحة تتحدث تلقائياً.</p>
  <div class="card">
    <div class="row">
      <div><label>رقم تسلسلي (ID)</label><input id="id" placeholder="مثلا 0002"></div>
      <div><label>تاريخ الاكتشاف</label><input id="date" type="date"></div>
    </div>
    <label>العنوان</label>
    <input id="title" placeholder="وصف قصير للمشكلة">

    <div class="row">
      <div><label>الحالة</label><select id="status">
        <option value="open">open — مفتوحة</option>
        <option value="in-progress">in-progress — جاري العمل</option>
        <option value="fixed">fixed — مُصلَّحة</option>
        <option value="wont-fix">wont-fix — لن تُصلح</option>
        <option value="cannot-reproduce">cannot-reproduce — لا يمكن إعادتها</option>
      </select></div>
      <div><label>الخطورة</label><select id="severity">
        <option value="critical">critical — حرجة</option>
        <option value="high">high — عالية</option>
        <option value="medium" selected>medium — متوسطة</option>
        <option value="low">low — منخفضة</option>
      </select></div>
    </div>
    <div class="row">
      <div><label>الدور</label><select id="role">
        <option value="admin">admin</option><option value="coordinator">coordinator</option>
        <option value="teacher">teacher</option><option value="student">student</option>
        <option value="gate">gate</option><option value="api">api</option>
      </select></div>
      <div><label>المنصة</label><select id="platform">
        <option value="web">web</option><option value="flutter">flutter</option>
        <option value="api">api</option><option value="pwa">pwa</option>
        <option value="face-engine">face-engine</option>
      </select></div>
      <div><label>الشاشة/الميزة</label><input id="area" placeholder="dashboard, scan ..."></div>
    </div>

    <label>الوصف</label><textarea id="desc"></textarea>
    <label>خطوات إعادة الإنتاج (كل خطوة في سطر)</label><textarea id="steps"></textarea>
    <label>النتيجة المتوقعة</label><textarea id="expected"></textarea>
    <label>النتيجة الفعلية / رسالة الخطأ</label><textarea id="actual"></textarea>
    <label>الملف/المسار المتوقع</label><input id="file" placeholder="attendance/views.py : ...">

    <div class="btns">
      <button class="b1" onclick="download()">⬇️ تنزيل الملف</button>
      <button class="b2" onclick="copyMd()">📋 نسخ الـMarkdown</button>
    </div>
    <div class="ok" id="msg"></div>
    <pre id="prev"></pre>
  </div>
</div>
<script>
  const $=id=>document.getElementById(id);
  $('date').value=new Date().toISOString().slice(0,10);
  function buildSteps(t){return (t.split('\n').filter(s=>s.trim()).map((s,i)=>`${i+1}. ${s.trim()}`).join('\n'))||'1. ';}
  function md(){
    const id=$('id').value.trim(), title=$('title').value.trim()||'مشكلة بدون عنوان';
    return `---
type: bug
id: ${id}
status: ${$('status').value}
severity: ${$('severity').value}
role: ${$('role').value}
platform: ${$('platform').value}
area: ${$('area').value.trim()}
date_found: ${$('date').value}
date_fixed:
tags: [bug]
---

# 🐞 ${title}

## الوصف
${$('desc').value.trim()||'-'}

## خطوات إعادة الإنتاج
${buildSteps($('steps').value)}

## النتيجة المتوقعة
${$('expected').value.trim()||'-'}

## النتيجة الفعلية
${$('actual').value.trim()||'-'}

## الملف/المسار المتوقع
- \`${$('file').value.trim()||''}\`

## الحل
- [ ] تم تحديد السبب
- [ ] تم الإصلاح
- [ ] تم إعادة الاختبار

### ملاحظات الإصلاح
`;}
  function refresh(){$('prev').textContent=md();}
  document.querySelectorAll('input,textarea,select').forEach(e=>e.addEventListener('input',refresh));
  refresh();
  function fname(){const id=$('id').value.trim(); const t=$('title').value.trim().replace(/[\\/:*?"<>|]/g,'').replace(/\s+/g,'-')||'مشكلة'; return (id?id+'-':'')+t+'.md';}
  function download(){const b=new Blob([md()],{type:'text/markdown;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fname();a.click();flash('✅ تم التنزيل — انقله إلى فولدر Issues');}
  function copyMd(){navigator.clipboard.writeText(md()).then(()=>flash('✅ تم النسخ'));}
  function flash(t){$('msg').textContent=t;setTimeout(()=>$('msg').textContent='',2500);}
</script>
</body>
</html>
