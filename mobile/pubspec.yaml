name: shamel
description: "SHAMEL — Smart Holistic Attendance Management & Compliance System (native mobile app)."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  camera: ^0.11.0+2
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3
  connectivity_plus: ^6.1.4
  path: ^1.9.0
  package_info_plus: ^8.1.3
  path_provider: ^2.1.5
  open_file: ^3.5.10
  url_launcher: ^6.3.1
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.3
  mockito: ^5.4.4
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-VF.ttf
          style: normal
