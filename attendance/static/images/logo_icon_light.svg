<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <clipPath id="left-half"><rect x="0" y="0" width="50" height="110"/></clipPath>
    <clipPath id="right-half"><rect x="50" y="0" width="50" height="110"/></clipPath>
  </defs>

  <!-- Shield path -->
  <path id="shield" d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"/>

  <!-- Left half — gold/bronze -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#left-half)"
        fill="url(#goldGrad)" stroke="#8B6914" stroke-width="2"/>

  <!-- Right half — navy blue -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#right-half)"
        fill="url(#blueGrad)" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Shield center divider line -->
  <line x1="50" y1="6" x2="50" y2="106" stroke="#fff" stroke-width="1" opacity="0.3"/>

  <!-- Shield border overall -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        fill="none" stroke="#888" stroke-width="1.5" opacity="0.5"/>

  <!-- Molecular left (gold side) — triangle with dots -->
  <line x1="22" y1="38" x2="34" y2="54" stroke="#C9A227" stroke-width="1.8"/>
  <line x1="34" y1="54" x2="22" y2="66" stroke="#C9A227" stroke-width="1.8"/>
  <line x1="22" y1="38" x2="22" y2="66" stroke="#C9A227" stroke-width="1.8"/>
  <line x1="22" y1="38" x2="34" y2="30" stroke="#C9A227" stroke-width="1.4"/>
  <circle cx="22" cy="38" r="3.5" fill="#C9A227"/>
  <circle cx="34" cy="54" r="3" fill="#C9A227"/>
  <circle cx="22" cy="66" r="3" fill="#C9A227"/>
  <circle cx="34" cy="30" r="2.5" fill="#C9A227"/>

  <!-- Molecular right (blue side) — triangle with dots -->
  <line x1="78" y1="38" x2="66" y2="54" stroke="#2E75B6" stroke-width="1.8"/>
  <line x1="66" y1="54" x2="78" y2="66" stroke="#2E75B6" stroke-width="1.8"/>
  <line x1="78" y1="38" x2="78" y2="66" stroke="#2E75B6" stroke-width="1.8"/>
  <line x1="78" y1="38" x2="66" y2="30" stroke="#2E75B6" stroke-width="1.4"/>
  <circle cx="78" cy="38" r="3.5" fill="#2E75B6"/>
  <circle cx="66" cy="54" r="3" fill="#2E75B6"/>
  <circle cx="78" cy="66" r="3" fill="#2E75B6"/>
  <circle cx="66" cy="30" r="2.5" fill="#2E75B6"/>

  <!-- Decorative S letter (Arabic style) at top center -->
  <text x="50" y="34" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="900" fill="#C9A227"
        style="font-style:italic;">S</text>

  <!-- Torch body -->
  <rect x="46.5" y="48" width="7" height="24" rx="2.5" fill="#C9A227"/>
  <!-- Torch notches -->
  <rect x="45.5" y="52" width="9" height="2" rx="1" fill="#8B6914"/>
  <rect x="45.5" y="56" width="9" height="2" rx="1" fill="#8B6914"/>
  <rect x="45.5" y="60" width="9" height="2" rx="1" fill="#8B6914"/>

  <!-- Flame -->
  <path d="M50 48 C47 44 44 41 46 36 C48 38 50 35 50 32 C50 35 52 38 54 36 C56 41 53 44 50 48Z"
        fill="url(#flameGrad)"/>
  <path d="M50 47 C48.5 44 47 42 48 38.5 C49 40 50 38 50 36 C50 38 51 40 52 38.5 C53 42 51.5 44 50 47Z"
        fill="#FFF5C0" opacity="0.85"/>

  <!-- Keyhole at base of torch -->
  <circle cx="50" cy="75" r="4.5" fill="none" stroke="#0B2545" stroke-width="2"/>
  <path d="M48 75 L48 82 L52 82 L52 75" fill="#0B2545"/>

  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F3864"/>
      <stop offset="50%" stop-color="#2E75B6"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="50%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
</svg>
