<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <clipPath id="left-half-d"><rect x="0" y="0" width="50" height="110"/></clipPath>
    <clipPath id="right-half-d"><rect x="50" y="0" width="50" height="110"/></clipPath>
    <filter id="goldglow-d">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blueglow-d">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="goldGrad-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="blueGrad-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4A8A"/>
      <stop offset="50%" stop-color="#4AABFF"/>
      <stop offset="100%" stop-color="#1A6ABF"/>
    </linearGradient>
    <linearGradient id="flameGrad-d" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFB020"/>
      <stop offset="50%" stop-color="#FF7800"/>
      <stop offset="100%" stop-color="#FFE040"/>
    </linearGradient>
  </defs>

  <!-- Glow backdrop -->
  <ellipse cx="50" cy="60" rx="36" ry="38" fill="#4AABFF" opacity="0.06"/>

  <!-- Left half — bright gold -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#left-half-d)"
        fill="url(#goldGrad-d)" stroke="#FFD700" stroke-width="2"
        filter="url(#goldglow-d)" opacity="0.95"/>

  <!-- Right half — electric blue -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#right-half-d)"
        fill="url(#blueGrad-d)" stroke="#4AABFF" stroke-width="2"
        filter="url(#blueglow-d)" opacity="0.95"/>

  <!-- Center divider -->
  <line x1="50" y1="6" x2="50" y2="106" stroke="#fff" stroke-width="1" opacity="0.2"/>

  <!-- Molecular left (gold) -->
  <line x1="22" y1="38" x2="34" y2="54" stroke="#F0C040" stroke-width="1.8"/>
  <line x1="34" y1="54" x2="22" y2="66" stroke="#F0C040" stroke-width="1.8"/>
  <line x1="22" y1="38" x2="22" y2="66" stroke="#F0C040" stroke-width="1.8"/>
  <line x1="22" y1="38" x2="34" y2="30" stroke="#F0C040" stroke-width="1.4"/>
  <circle cx="22" cy="38" r="3.5" fill="#F0C040" filter="url(#goldglow-d)"/>
  <circle cx="34" cy="54" r="3" fill="#F0C040"/>
  <circle cx="22" cy="66" r="3" fill="#F0C040"/>
  <circle cx="34" cy="30" r="2.5" fill="#F0C040"/>

  <!-- Molecular right (blue) -->
  <line x1="78" y1="38" x2="66" y2="54" stroke="#4AABFF" stroke-width="1.8"/>
  <line x1="66" y1="54" x2="78" y2="66" stroke="#4AABFF" stroke-width="1.8"/>
  <line x1="78" y1="38" x2="78" y2="66" stroke="#4AABFF" stroke-width="1.8"/>
  <line x1="78" y1="38" x2="66" y2="30" stroke="#4AABFF" stroke-width="1.4"/>
  <circle cx="78" cy="38" r="3.5" fill="#4AABFF" filter="url(#blueglow-d)"/>
  <circle cx="66" cy="54" r="3" fill="#4AABFF"/>
  <circle cx="78" cy="66" r="3" fill="#4AABFF"/>
  <circle cx="66" cy="30" r="2.5" fill="#4AABFF"/>

  <!-- Decorative S -->
  <text x="50" y="34" text-anchor="middle"
        font-family="Georgia, serif" font-size="18" font-weight="900"
        fill="#F0C040" filter="url(#goldglow-d)" style="font-style:italic;">S</text>

  <!-- Torch body -->
  <rect x="46.5" y="48" width="7" height="24" rx="2.5" fill="#F0C040"/>
  <rect x="45.5" y="52" width="9" height="2" rx="1" fill="#C9A227"/>
  <rect x="45.5" y="56" width="9" height="2" rx="1" fill="#C9A227"/>
  <rect x="45.5" y="60" width="9" height="2" rx="1" fill="#C9A227"/>

  <!-- Flame (bright glow) -->
  <path d="M50 48 C47 44 44 41 46 36 C48 38 50 35 50 32 C50 35 52 38 54 36 C56 41 53 44 50 48Z"
        fill="url(#flameGrad-d)" filter="url(#goldglow-d)"/>
  <path d="M50 47 C48.5 44 47 42 48 38.5 C49 40 50 38 50 36 C50 38 51 40 52 38.5 C53 42 51.5 44 50 47Z"
        fill="#FFFBAA" opacity="0.9"/>

  <!-- Keyhole -->
  <circle cx="50" cy="75" r="4.5" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <path d="M48 75 L48 82 L52 82 L52 75" fill="#fff" opacity="0.7"/>

  <!-- Bottom glow -->
  <ellipse cx="50" cy="106" rx="18" ry="5" fill="#4AABFF" opacity="0.2"/>
</svg>
