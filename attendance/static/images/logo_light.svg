<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" fill="none">
  <defs>
    <clipPath id="lh-l"><rect x="0" y="0" width="50" height="110"/></clipPath>
    <clipPath id="rh-l"><rect x="50" y="0" width="50" height="110"/></clipPath>
    <linearGradient id="gG-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A017"/><stop offset="50%" stop-color="#C9A227"/><stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="bG-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F3864"/><stop offset="50%" stop-color="#2E75B6"/><stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="fG-l" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8A020"/><stop offset="50%" stop-color="#FF6B00"/><stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Shield left (gold) -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#lh-l)" fill="url(#gG-l)" stroke="#8B6914" stroke-width="1.8"/>
  <!-- Shield right (navy) -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        clip-path="url(#rh-l)" fill="url(#bG-l)" stroke="#1a3a6b" stroke-width="1.8"/>
  <!-- Shield border -->
  <path d="M50 6 L86 18 L86 58 C86 80 68 98 50 106 C32 98 14 80 14 58 L14 18 Z"
        fill="none" stroke="#888" stroke-width="1.5" opacity="0.5"/>

  <!-- Molecular left -->
  <line x1="22" y1="38" x2="34" y2="54" stroke="#C9A227" stroke-width="1.6"/>
  <line x1="34" y1="54" x2="22" y2="66" stroke="#C9A227" stroke-width="1.6"/>
  <line x1="22" y1="38" x2="22" y2="66" stroke="#C9A227" stroke-width="1.6"/>
  <line x1="22" y1="38" x2="34" y2="30" stroke="#C9A227" stroke-width="1.2"/>
  <circle cx="22" cy="38" r="3.2" fill="#C9A227"/><circle cx="34" cy="54" r="2.8" fill="#C9A227"/>
  <circle cx="22" cy="66" r="2.8" fill="#C9A227"/><circle cx="34" cy="30" r="2.2" fill="#C9A227"/>

  <!-- Molecular right -->
  <line x1="78" y1="38" x2="66" y2="54" stroke="#2E75B6" stroke-width="1.6"/>
  <line x1="66" y1="54" x2="78" y2="66" stroke="#2E75B6" stroke-width="1.6"/>
  <line x1="78" y1="38" x2="78" y2="66" stroke="#2E75B6" stroke-width="1.6"/>
  <line x1="78" y1="38" x2="66" y2="30" stroke="#2E75B6" stroke-width="1.2"/>
  <circle cx="78" cy="38" r="3.2" fill="#2E75B6"/><circle cx="66" cy="54" r="2.8" fill="#2E75B6"/>
  <circle cx="78" cy="66" r="2.8" fill="#2E75B6"/><circle cx="66" cy="30" r="2.2" fill="#2E75B6"/>

  <!-- S letter -->
  <text x="50" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="900" fill="#C9A227" style="font-style:italic;">S</text>

  <!-- Torch -->
  <rect x="46.5" y="47" width="7" height="23" rx="2.5" fill="#C9A227"/>
  <rect x="45.5" y="51" width="9" height="1.8" rx="0.9" fill="#8B6914"/>
  <rect x="45.5" y="55" width="9" height="1.8" rx="0.9" fill="#8B6914"/>
  <rect x="45.5" y="59" width="9" height="1.8" rx="0.9" fill="#8B6914"/>
  <!-- Flame -->
  <path d="M50 47 C47 43 44 40 46 35 C48 37 50 34 50 31 C50 34 52 37 54 35 C56 40 53 43 50 47Z" fill="url(#fG-l)"/>
  <path d="M50 46 C48.5 43 47 41 48 37.5 C49 39 50 37.5 50 36 C50 37.5 51 39 52 37.5 C53 41 51.5 43 50 46Z" fill="#FFF5C0" opacity="0.8"/>
  <!-- Keyhole -->
  <circle cx="50" cy="73" r="4" fill="none" stroke="#1F3864" stroke-width="1.8"/>
  <path d="M48.5 73 L48.5 79 L51.5 79 L51.5 73" fill="#1F3864"/>

  <!-- SHAMEL wordmark -->
  <text x="106" y="52" font-family="Manrope, 'Segoe UI', system-ui, sans-serif"
        font-size="38" font-weight="900" fill="#1F3864" letter-spacing="1.5">SHAMEL</text>
  <!-- Tagline -->
  <text x="108" y="68" font-family="Inter, 'Segoe UI', sans-serif" font-size="10" fill="#6B7FA3" letter-spacing="0.3">Secure High-dimensional Academic Management &amp; Entry Logic</text>
</svg>
