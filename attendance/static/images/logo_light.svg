<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" fill="none">
  <!-- Shield body -->
  <path d="M42 8 L72 8 C74 8 76 10 76 12 L76 44 C76 58 58 72 57 73 C56 72 38 58 38 44 L38 12 C38 10 40 8 42 8Z" fill="#0B2545" stroke="#1a3a6b" stroke-width="1.5"/>
