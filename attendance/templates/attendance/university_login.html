<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | National university</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#332306",
                        "outline-variant": "#c5c6cd",
                        "inverse-on-surface": "#f0f1f2",
                        "primary-fixed-dim": "#bbc6e2",
                        "surface-container": "#edeeef",
                        "surface": "#f8f9fa",
                        "on-tertiary-container": "#a28963",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#574423",
                        "surface-tint": "#545e76",
                        "on-secondary-fixed-variant": "#434751",
                        "on-tertiary-fixed": "#271901",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed": "#dfe2ee",
                        "secondary-fixed-dim": "#c3c6d2",
                        "on-surface": "#191c1d",
                        "tertiary": "#1a0f00",
                        "inverse-primary": "#bbc6e2",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#fcdeb3",
                        "on-background": "#191c1d",
                        "tertiary-fixed-dim": "#dfc299",
                        "secondary-container": "#dcdfec",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-surface-variant": "#45474d",
                        "primary-fixed": "#d7e2ff",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-high": "#e7e8e9",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "background": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#181c24",
                        "primary": "#051125",
                        "surface-bright": "#f8f9fa",
                        "secondary": "#5a5e69",
                        "surface-variant": "#e1e3e4",
                        "primary-container": "#1b263b",
                        "on-primary-fixed": "#101b30",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#3c475d",
                        "on-secondary-container": "#5f626d",
                        "outline": "#75777d",
                        "on-primary-container": "#828da7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .geometric-pattern {
            background-image: radial-gradient(circle at 2px 2px, #c5c6cd 1px, transparent 0);
            background-size: 48px 48px;
            opacity: 0.15;
        }
        .glossy-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface overflow-y-auto">
    <div class="fixed inset-0 z-0 bg-surface">
        <div class="absolute inset-0 geometric-pattern"></div>
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary-container/5 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-secondary-container/10 blur-[120px]"></div>
    </div>

    <main class="min-h-screen flex flex-col items-center justify-center py-8 relative z-10">
        
        <div class="w-full max-w-[400px] flex flex-col items-center">
            
            <div class="mb-6 flex flex-col items-center text-center">
                <div class="mb-4 flex h-16 w-16 items-center justify-center rounded-xl bg-primary text-white shadow-xl shadow-primary/20">
                    <span class="material-symbols-outlined text-4xl">account_balance</span>
                </div>
                <h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary md:text-4xl">
                    National University
                </h1>
                <p class="mt-2 font-label text-sm font-medium uppercase tracking-[0.2em] text-on-surface-variant">
                    Digital Chancellor Portal
                </p>
            </div>

            <div class="glossy-card w-full rounded-xl shadow-2xl shadow-primary/5 p-4 md:p-6 border border-white/40">
                <header class="mb-6">
                    <h2 class="font-headline text-2xl font-bold text-on-surface">Secure Sign-In</h2>
                    <p class="mt-1 text-sm text-on-surface-variant">Access your dashboard.</p>
                </header>

                <form class="space-y-3" method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-on-surface-variant uppercase">University ID</label>
                        <div class="relative flex items-center">
                            <span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">alternate_email</span>
                            <input name="username" class="w-full rounded-xl bg-surface-container-high px-12 py-4 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/10 transition-all" placeholder="e.g. 2023-45678" type="text"/>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-on-surface-variant uppercase">Password</label>
                        <div class="relative flex items-center">
                            <span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">lock</span>
                            <input name="password" class="w-full rounded-xl bg-surface-container-high px-12 py-4 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/10 transition-all" placeholder="••••••••" type="password"/>
                        </div>
                    </div>

                    <button class="w-full rounded-xl bg-primary-container py-4 font-headline text-sm font-bold text-white shadow-lg hover:bg-primary transition-all active:scale-[0.98]" type="submit">
                        Sign In to System
                    </button>
                </form>

                <div class="mt-8 flex items-center justify-center gap-2">
                    <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
                    <span class="text-[10px] font-bold text-outline-variant uppercase tracking-widest px-2">Biometric</span>
                    <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
                </div>
                <div class="mt-6 flex justify-center">
                    <button class="flex h-12 w-12 items-center justify-center rounded-full border border-outline-variant/30 text-on-surface-variant hover:bg-surface-container">
                        <span class="material-symbols-outlined text-[24px]">face</span>
                    </button>
                </div>
            </div>

            <footer class="mt-8 flex w-full items-center justify-between px-2">
                <div class="flex items-center gap-2 text-xs font-medium text-on-surface-variant">
                    <span class="flex h-2 w-2 rounded-full bg-emerald-500"></span>
                    Status: Active
                </div>
                <div class="flex items-center gap-4 text-xs font-medium text-on-surface-variant">
                    <a href="#" class="hover:text-primary">Help Center</a>
                </div>
            </footer>
        </div>

       <div class="lg:fixed lg:right-12 lg:top-12 lg:bottom-12 lg:flex lg:w-1/3 ...">
             </div>
    </main>

</body></html>
