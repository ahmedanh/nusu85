<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SHAMEL{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-emerald-400">SHAMEL</h1>
      <p class="text-slate-400 text-sm mt-1">نظام شامل لإدارة الحضور والدخول الجامعي</p>
    </div>
    <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-8">
      {% block content %}{% endblock %}
    </div>
    <p class="text-center text-slate-500 text-xs mt-6">© 2025 SHAMEL University System</p>
  </div>
</body>
</html>
