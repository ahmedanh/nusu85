server {
    listen 80;
    server_name 84.46.251.93;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 84.46.251.93;

    # TLS — NFR-02: TLS 1.2 minimum, TLS 1.3 preferred
    ssl_certificate     /etc/letsencrypt/live/84.46.251.93/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/84.46.251.93/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json text/xml;
    gzip_min_length 1024;

    # Static files
    location /static/ {
        alias /home/ubuntu/nusu85_new/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /home/ubuntu/nusu85_new/media/;
        expires 7d;
    }

    # Django app
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
